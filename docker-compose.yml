services:
  slider-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slider-generator
    environment:
      - SLIDES_OUTPUT_FOLDER=${SLIDES_OUTPUT_FOLDER}
      - THEME_MARP=${THEME_MARP}
      - LRS_ENDPOINT=${LRS_ENDPOINT}
      - LOGIN_LRS=${LOGIN_LRS}
      - PASSWORD_LRS=${PASSWORD_LRS}
      - API_AI=${API_AI}
      - API_NEXTCLOUD=${API_NEXTCLOUD}
      - LOGIN_NEXTCLOUD=${LOGIN_NEXTCLOUD}
      - PASSWORD_NEXTCLOUD=${PASSWORD_NEXTCLOUD}
      - FOLDER_NEXTCLOUD=${FOLDER_NEXTCLOUD}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./prompts:/app/prompts
    working_dir: /app
    depends_on:
      lrs:
        condition: service_healthy
      nextcloud:
        condition: service_healthy
    networks:
      - slider-network

  lrs:
    build:
      context: ./lrs_server
      dockerfile: Dockerfile.lrs
    container_name: lrs-test
    ports:
      - "8000:8000"
    networks:
      - slider-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]      
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
      
  nextcloud:
    image: nextcloud:29-apache
    container_name: nextcloud-test
    environment:
      - POSTGRES_HOST=${NEXTCLOUD_DB_HOST}
      - POSTGRES_DB=${NEXTCLOUD_DB}
      - POSTGRES_USER=${NEXTCLOUD_USER}
      - POSTGRES_PASSWORD=${NEXTCLOUD_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - OVERWRITEPROTOCOL=${OVERWRITEPROTOCOL}
      - OVERWRITEHOST=${OVERWRITEHOST}
      - OVERWRITEWEBROOT=${OVERWRITEWEBROOT}
    ports:
      - "8080:80"
    depends_on:
      postgres-nextcloud:
        condition: service_healthy
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud/apps:/var/www/html/custom_apps
    networks:
      - slider-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  postgres-nextcloud:
    image: postgres:15-alpine
    container_name: postgres-nextcloud
    environment:
      - POSTGRES_DB=${NEXTCLOUD_DB}
      - POSTGRES_USER=${NEXTCLOUD_USER}
      - POSTGRES_PASSWORD=${NEXTCLOUD_PASSWORD}
    volumes:
      - nextcloud_db_data:/var/lib/postgresql/data
    networks:
      - slider-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXTCLOUD_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  slider-network:
    driver: bridge

volumes:
  nextcloud_data:
  nextcloud_db_data: